<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker Assignment-5</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind & daisy Ul -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!--font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--style.css  -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-slate-100">
    <!-- header section -->
    <header>
        <div class="navbar flex flex-wrap items-center justify-between bg-base-100 shadow-sm px-10 space-y-3">
            <div class=" flex items-center gap-4">
                <img src="./assets/github-logo.png" class="w-6" alt="">
                <a class=" text-xl font-semibold">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <div class="join">
                    <div>
                        <label class="input">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="search" required placeholder="Search..." />
                        </label>
                    </div>
                    <button class="btn btn-neutral join-item">Search</button>
                </div>
                <button class="btn btn-primary "><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>
    <main>
        <section class="container mx-auto py-10 ">
            <!-- button section -->
            <div class="bg-white rounded-lg shadow-sm py-4 px-5">
                <div id="button-container" class="but-container flex gap-2">
                    <button id="allBtnContainer" class="btn  bg-[#4A00FF] text-white shadow-md  ">All</button>
                    <button id="openBtnContainer" class="btn bg-white shadow-md  ">Open</button>
                    <button id="closedBtnContainer" class="btn bg-white shadow-md  ">Closed</button>
                </div>
            </div>
            <!-- container section -->
            <div class="all-container bg-gray-200 rounded-lg  my-5 ">
                <div class="count-container bg-white shadow-sm flex items-center justify-between px-5">
                    <div class="count-item flex items-center gap-5 py-4">
                        <img src="./assets/Aperture.png" alt="">
                        <div>
                            <h6 id="count" class="text-[#1F2937] text-[20px]"></h6>
                            <p class="text-[#64748B] text-[16px]">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="count-item-2 ">
                        <ul class="flex items-center justify-between gap-5">
                            <li><i class="fa-solid fa-circle text-green-600"></i> Open</li>
                            <li> <i class="fa-solid fa-circle text-purple-600"></i>Close</li>
                        </ul>
                    </div>
                </div>
                <!-- categories -->
                <div class="card-container py-5">

                    <div class=" ">
                        <!--trees will rendered  -->
                        <div id="treesContainer" class="card-item grid  
                        grid-cols-1  md:grid-cols-4 gap-4 px-4">
                            <!-- card item -->


                            <!-- card item -->

                            <!-- loading spinner -->
                            <div id="loadingSpinner" class="h-[60vh] flex hidden 
                                        items-center justify-center ">
                                <span class="loading loading-spinner text-success"></span>
                            </div>

                        </div>
                    </div>

                </div>


                <!-- Open the modal using ID.showModal() method -->
                <!-- <button class="btn" onclick="tree_details.showModal()">open modal</button> -->
                <dialog id="tree_details" class="modal modal-bottom sm:modal-middle">
                    <div class="modal-box bg-white rounded-xl shadow-xl w-[600px] p-6 relative space-y-5">
                        <!-- Close Button -->
                        <button class="absolute right-5 top-4 text-xl cursor-pointer text-gray-500 hover:text-black"
                            onclick="document.getElementById('tree_details').close()">✕</button>

                        <!--  -->
                        <h2 id="modalTitle" class="text-2xl font-semibold"></h2>

                        <div class="flex items-center gap-2 mt-2 text-sm text-gray-500">
                            <span id="modalStatus"></span>
                            <span id="modalAuthor"></span>
                            <span id="modalDate"></span>
                        </div>

                        <div id="modalLabels" class="flex gap-2 mt-3"></div>

                        <p id="modalDescription" class="mt-4 text-gray-600"></p>

                        <div class="flex justify-between items-center bg-gray-100 px-5 py-4">

                            <div>
                                <p class="text-sm text-gray-500">Assignee:</p>
                                <p id="modalAssignee" class="font-semibold"></p>
                            </div>

                            <div>
                                <p class="text-sm text-gray-500">Priority:</p>
                                <span id="modalPriority"
                                    class="bg-red-500 text-white text-xs px-3 py-1 rounded-full"></span>
                            </div>
                            <!--  -->


                            <div class="modal-action">
                                <form method="dialog">
                                    <!-- if there is a button in form, it will close the modal -->
                                    <button class="btn">Close</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </dialog>


        </section>
    </main>













    <script src="./script/home.js"></script>
</body>

</html>
